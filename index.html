            autoSyncStatus(val);
        }
        function onProgressInputChange(val) {
            val = parseInt(val) || 0;
            if (val < 0) val = 0; if (val > 100) val = 100;
            document.getElementById('progressSlider').value = val;
            autoSyncStatus(val);
        }
        function autoSyncStatus(progress) {
            const statusEl = document.getElementById('status');
            const currentStatus = statusEl.value;
            if (progress >= 100 && currentStatus !== 'completed') {
                statusEl.value = 'completed';
                showToast('进度100% → 自动标记为已完成', 'success');
            } else if (progress > 0 && progress < 100 && (currentStatus === 'pending' || currentStatus === '')) {
                statusEl.value = 'progress';
                showToast('进度>0% → 自动标记为进行中', 'info');
            }
        }

        // ===== Week Navigation =====
        function changeWeek(delta) {
            currentWeekOffset += delta;
            updateWeekLabel();
            renderTasks(); updateStats();
        }
        function updateWeekLabel() {
            const week = getWeekRange(currentWeekOffset);
            const label = document.getElementById('weekLabel');
            if (currentWeekOffset === 0) label.textContent = '本周';
            else if (currentWeekOffset === 1) label.textContent = '下周';
            else if (currentWeekOffset === -1) label.textContent = '上周';
            else label.textContent = `${formatDateCN(week.start)} - ${formatDateCN(week.end)}`;
        }

        // ===== Tab Switching =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            const statsBar = document.getElementById('statsBar');
            const filtersRow = document.getElementById('filtersRow');
            const taskSection = document.getElementById('taskSection');
            const sidebar = document.getElementById('sidebar');
            const archivePanel = document.getElementById('archivePanel');

            if (tab === 'archive') {
                statsBar.style.display = 'none';
                filtersRow.style.display = 'none';
                sidebar.style.display = 'none';
                taskSection.style.display = 'none';
                archivePanel.style.display = 'block';
                currentWeekOffset = -1;
                updateWeekLabel();
                renderArchivePanel();
            } else {
                statsBar.style.display = 'grid';
                filtersRow.style.display = 'flex';
                sidebar.style.display = '';
                taskSection.style.display = '';
                archivePanel.style.display = 'none';
                currentWeekOffset = tab === 'next' ? 1 : 0;
                updateWeekLabel();
                renderTasks(); updateStats();
            }
        }

        // ===== Sort: This-week first, then future =====
        function getSortScore(task) {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const deadline = new Date(task.deadline); deadline.setHours(0, 0, 0, 0);
            const daysLeft = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
            const priorityWeight = { high: 3, medium: 2, low: 1 }[task.priority] || 2;
            let urgencyFactor = 0;
            if (task.status !== 'completed') {
                if (daysLeft < 0) urgencyFactor = 100;
                else if (daysLeft === 0) urgencyFactor = 50;
                else if (daysLeft === 1) urgencyFactor = 30;
                else if (daysLeft === 2) urgencyFactor = 20;
                else if (daysLeft <= 7) urgencyFactor = 10;
            }
            const completedPenalty = task.status === 'completed' ? 1000 : 0;
            const adjustedDays = daysLeft < 0 ? (100 + Math.abs(daysLeft)) : daysLeft;
            return {
                score: (100 - adjustedDays) + (priorityWeight * 10) + urgencyFactor - completedPenalty,
                daysLeft: daysLeft
            };
        }
        function sortTasks(taskList) {
            return [...taskList].sort((a, b) => {
                const sa = getSortScore(a), sb = getSortScore(b);
                if (sa.score !== sb.score) return sb.score - sa.score;
                return new Date(a.deadline) - new Date(b.deadline);
            });
        }

        // ===== Quick Update Task (Inline Edit) =====
        function quickUpdateTask(taskId, field, value) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            let justCompleted = false;

            if (field === 'progress') {
                value = parseInt(value) || 0;
                if (value < 0) value = 0;
                if (value > 100) value = 100;
                task.progress = value;
                // Auto-sync status
                if (value >= 100 && task.status !== 'completed') {
                    task.status = 'completed';
                    justCompleted = true;
                } else if (value > 0 && value < 100 && task.status === 'pending') {
                    task.status = 'progress';
                } else if (value === 0 && task.status === 'completed') {
                    task.status = 'pending';
                }
            } else if (field === 'status') {
                const oldStatus = task.status;
                task.status = value;
                // Auto-sync progress
                if (value === 'completed' && task.progress < 100) {
                    task.progress = 100;
                } else if (value === 'pending' && task.progress > 0) {
                    // Keep progress, user may have partial work
                }
                if (oldStatus !== 'completed' && value === 'completed') justCompleted = true;
            } else if (field === 'timeCost') {
                task.timeCost = parseFloat(value) || 0;
            } else if (field === 'timeUnit') {
                task.timeUnit = value;
            } else {
                task[field] = value;
            }

            saveToStorage();
            renderTasks();
            updateStats();
            updateProjectFilter();

            if (justCompleted) {
                setTimeout(() => triggerCelebration(task.taskName), 300);
            }
        }

        // ===== Inline Edit Functions =====
        function startInlineEdit(taskId, field, el) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            const td = el.closest('td');
            if (!td) return;

            // Prevent double-edit
            if (td.querySelector('.inline-edit-select, .inline-edit-input, .inline-edit-date, .inline-edit-range')) return;

            const originalHTML = td.innerHTML;

            if (field === 'category') {
                const cats = getCategories();
                let options = cats.map(c => `<option value="${c.key}" ${c.key === task.category ? 'selected' : ''}>${c.icon} ${c.label}</option>`).join('');
                td.innerHTML = `<select class="inline-edit-select" onchange="quickUpdateTask(${taskId},'category',this.value);renderTasks();" onblur="renderTasks();">${options}</select>`;
                const sel = td.querySelector('select');
                sel.focus();
            } else if (field === 'priority') {
                let options = ['high', 'medium', 'low'].map(p => `<option value="${p}" ${p === task.priority ? 'selected' : ''}>${priorityLabels[p]}</option>`).join('');
                td.innerHTML = `<select class="inline-edit-select" onchange="quickUpdateTask(${taskId},'priority',this.value);renderTasks();" onblur="renderTasks();">${options}</select>`;
                const sel = td.querySelector('select');
                sel.focus();
            } else if (field === 'timeCost') {
                const tc = task.timeCost || '';
                const tu = task.timeUnit || 'h';
                td.innerHTML = `<div style="display:flex;gap:4px;align-items:center;">
                    <input class="inline-edit-input" type="number" min="0" step="0.5" value="${tc}" placeholder="0"
                        onblur="quickUpdateTask(${taskId},'timeCost',this.value);quickUpdateTask(${taskId},'timeUnit',this.nextElementSibling.value);renderTasks();">
                    <select class="inline-edit-unit" onblur="renderTasks();">
                        <option value="h" ${tu==='h'?'selected':''}>h</option>
                        <option value="d" ${tu==='d'?'selected':''}>d</option>
                    </select>
                </div>`;
                td.querySelector('input').focus();
            } else if (field === 'progress') {
                td.innerHTML = `<div style="display:flex;align-items:center;gap:6px;">
                    <input class="inline-edit-range" type="range" min="0" max="100" value="${task.progress}"
                        oninput="this.nextElementSibling.textContent=this.value+'%'"
                        onchange="quickUpdateTask(${taskId},'progress',this.value);">
                    <span style="font-size:0.75rem;min-width:34px;color:var(--gray-600);">${task.progress}%</span>
                </div>`;
                // Close on click outside
                const rangeEl = td.querySelector('input[type=range]');
                rangeEl.focus();
                const closeHandler = (e) => {
                    if (!td.contains(e.target)) {
                        document.removeEventListener('mousedown', closeHandler);
                        renderTasks();
                    }
                };
                setTimeout(() => document.addEventListener('mousedown', closeHandler), 10);
            } else if (field === 'deadline') {
                td.innerHTML = `<input class="inline-edit-date" type="date" value="${task.deadline}"
                    onchange="quickUpdateTask(${taskId},'deadline',this.value);renderTasks();"
                    onblur="renderTasks();">`;
                td.querySelector('input').focus();
            } else if (field === 'status') {
                let options = Object.entries(statusLabels).map(([k,v]) => `<option value="${k}" ${k === task.status ? 'selected' : ''}>${v}</option>`).join('');
                td.innerHTML = `<select class="inline-edit-select" onchange="quickUpdateTask(${taskId},'status',this.value);renderTasks();" onblur="renderTasks();">${options}</select>`;
                const sel = td.querySelector('select');
                sel.focus();
            }
        }

        // ===== Render: Build a task row =====
        function buildTaskRow(task, showProject = true) {
            const urgent = isUrgent(task.deadline, task.status);
            const overdue = new Date(task.deadline) < new Date() && task.status !== 'completed';
            const catInfo = getCategoryInfo(task.category);
            const projInfo = getProjectInfo(task.projectName);
            const hasProject = task.projectName && task.projectName.trim() !== '';
            const isCompleted = task.status === 'completed';
            const timeStr = formatTimeCost(task.timeCost, task.timeUnit);
            const isFuture = currentTab === 'current' && isAfterWeek(task.deadline, 0);

            return `
                <tr class="${urgent && !isCompleted ? 'urgent-row' : ''} ${isCompleted ? 'completed-row' : ''} ${isFuture ? 'future-row' : ''}">
                    <td>
                        <div class="task-cell tooltip-trigger"
                            onmouseenter="showTooltip(event, ${task.id})"
                            onmouseleave="hideTooltip()">
                            <div class="task-name">
                                ${task.priority === 'high' ? '<span style="color:#FF5252;">🔥</span>' : ''}
                                ${task.taskName}
                            </div>
                            ${showProject && hasProject ? `<div class="task-project-tag" style="color:${projInfo.color};font-weight:600;">${projInfo.icon} ${task.projectName}</div>` : ''}
                            ${timeStr ? `<div class="task-time-tag">⏱ ${timeStr}</div>` : ''}
                            <div class="task-tooltip" id="tooltip-${task.id}"></div>
                        </div>
                    </td>
                    <td><span class="editable-cell badge" style="background:${catInfo.color}18;color:${catInfo.color};" onclick="startInlineEdit(${task.id},'category',this)">${catInfo.icon} ${catInfo.label}</span></td>
                    <td><span class="editable-cell priority-${task.priority}" onclick="startInlineEdit(${task.id},'priority',this)">${priorityLabels[task.priority]}</span></td>
                    <td>${timeStr ? `<span class="editable-cell time-cost" onclick="startInlineEdit(${task.id},'timeCost',this)">⏱ ${timeStr}</span>` : `<span class="editable-cell" style="color:var(--gray-300);" onclick="startInlineEdit(${task.id},'timeCost',this)">—</span>`}</td>
                    <td>
                        <div class="editable-cell progress-wrapper" onclick="startInlineEdit(${task.id},'progress',this)">
                            <div class="progress-bar"><div class="progress-fill ${isCompleted ? 'complete' : ''}" style="width:${task.progress}%"></div></div>
                            <span class="progress-text">${task.progress}%</span>
                        </div>
                    </td>
                    <td>
                        <div class="editable-cell date-cell ${overdue ? 'date-overdue' : ''} ${urgent && !overdue ? 'date-urgent' : ''}" onclick="startInlineEdit(${task.id},'deadline',this)">
                            <div class="date-main">${formatDate(task.deadline)}</div>
                            <div class="date-relative">${getRelativeTime(task.deadline)}</div>
                        </div>
                    </td>
                    <td><span class="editable-cell status-badge status-${task.status}" onclick="startInlineEdit(${task.id},'status',this)">${statusLabels[task.status]}</span></td>
                    <td>
                        <div class="actions">
                            <button class="action-btn" onclick="editTask(${task.id})" title="编辑">✏️</button>
                            <button class="action-btn" onclick="deleteTask(${task.id})" title="删除">🗑️</button>
                        </div>
                    </td>
                </tr>
            `;
        }

        // ===== Tooltip =====
        function showTooltip(event, taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            const catInfo = getCategoryInfo(task.category);
            const projInfo = getProjectInfo(task.projectName);
            const tip = document.getElementById(`tooltip-${taskId}`);
            if (!tip) return;
            const timeStr = formatTimeCost(task.timeCost, task.timeUnit);
            tip.innerHTML = `
                <div class="tooltip-header">${task.priority === 'high' ? '🔥 ' : ''}${task.taskName}</div>
                <div class="tooltip-row"><span class="tooltip-label">项目</span><span class="tooltip-value" style="color:${projInfo.color};font-weight:500;">${projInfo.icon} ${task.projectName || '个人任务'}</span></div>
                <div class="tooltip-row"><span class="tooltip-label">类型</span><span class="tooltip-value" style="color:${catInfo.color};">${catInfo.icon} ${catInfo.label}</span></div>
                <div class="tooltip-row"><span class="tooltip-label">优先级</span><span class="tooltip-value" style="color:${task.priority === 'high' ? '#E53935' : task.priority === 'medium' ? '#F57C00' : '#43A047'};font-weight:600;">${priorityLabels[task.priority]}</span></div>
                <div class="tooltip-row"><span class="tooltip-label">进度</span><span class="tooltip-value">${task.progress}%</span></div>
                <div class="tooltip-row"><span class="tooltip-label">截止</span><span class="tooltip-value">${formatDate(task.deadline)} (${getRelativeTime(task.deadline)})</span></div>
                <div class="tooltip-row"><span class="tooltip-label">状态</span><span class="tooltip-value">${statusLabels[task.status]}</span></div>
                ${timeStr ? `<div class="tooltip-row"><span class="tooltip-label">耗时</span><span class="tooltip-value">⏱ ${timeStr}</span></div>` : ''}
                ${task.notes ? `<div class="tooltip-notes">${task.notes}</div>` : ''}
            `;
            tip.classList.add('show');
        }
        function hideTooltip() {
            document.querySelectorAll('.task-tooltip.show').forEach(t => t.classList.remove('show'));
        }

        // ===== Render Functions =====
        function renderListView(filteredTasks) {
            const tbody = document.getElementById('taskTableBody');
            const sorted = sortTasks(filteredTasks);
            if (sorted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无任务数据</div></div></td></tr>`;
                return;
            }

            let thisWeekTasks = [];
            let futureTasks = [];
            if (currentTab === 'current') {
            thisWeekTasks = sorted.filter(t => isInWeek(t.deadline, 0));
                futureTasks = sorted.filter(t => isAfterWeek(t.deadline, 0));
            } else {
                thisWeekTasks = sorted;
            }

            let html = '';
            if (thisWeekTasks.length > 0) {
                html += thisWeekTasks.map(t => buildTaskRow(t)).join('');
            }
            if (futureTasks.length > 0) {
                html += `
                    <tr class="week-divider"><td colspan="8">
                        <div class="week-divider-text">🔮 后续工作安排 <span style="font-weight:400;color:var(--gray-400);font-size:0.7rem;">（截止日期在本周之后）</span></div>
                    </td></tr>
                `;
                html += futureTasks.map(t => buildTaskRow(t)).join('');
            }
            tbody.innerHTML = html;
        }

        function renderGroupView(filteredTasks) {
            const tbody = document.getElementById('taskTableBody');
            if (filteredTasks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无任务数据</div></div></td></tr>`;
                return;
            }
            const groups = {};
            filteredTasks.forEach(task => {
                const key = task.projectName && task.projectName.trim() !== '' ? task.projectName : '个人任务';
                if (!groups[key]) groups[key] = [];
                groups[key].push(task);
            });
            let html = '';
            Object.keys(groups).forEach(name => {
                const projectTasks = sortTasks(groups[name]);
                const total = projectTasks.length;
                const completed = projectTasks.filter(t => t.status === 'completed').length;
                const urgentCount = projectTasks.filter(t => isUrgent(t.deadline, t.status) && t.status !== 'completed').length;
                const projInfo = name === '个人任务' ? { icon: '📌', color: '#0277BD' } : getProjectInfo(name);
                html += `<tr class="project-group-header" style="background:linear-gradient(90deg, ${projInfo.color}0F, ${projInfo.color}05);"><td colspan="8"><div class="project-title" style="color:${projInfo.color};"><span>${projInfo.icon}</span><span>${name}</span><span class="project-stats" style="color:${projInfo.color};">${completed}/${total} 完成${urgentCount > 0 ? ` · 🔥${urgentCount}` : ''}</span></div></td></tr>`;
                html += projectTasks.map(t => buildTaskRow(t, false)).join('');
            });
            tbody.innerHTML = html;
        }

        function renderCategoryView(filteredTasks) {
            const tbody = document.getElementById('taskTableBody');
            if (filteredTasks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无任务数据</div></div></td></tr>`;
                return;
            }
            const cats = getCategories();
            const groups = {};
            filteredTasks.forEach(task => {
                const key = task.category || 'other';
                if (!groups[key]) groups[key] = [];
                groups[key].push(task);
            });
            let html = '';
            cats.forEach(cat => {
                if (!groups[cat.key] || groups[cat.key].length === 0) return;
                const catTasks = sortTasks(groups[cat.key]);
                const total = catTasks.length;
                const completed = catTasks.filter(t => t.status === 'completed').length;
                const totalTime = catTasks.reduce((sum, t) => {
                    const v = t.timeCost || 0;
                    return sum + (t.timeUnit === 'd' ? v * 8 : v);
                }, 0);
                html += `<tr class="project-group-header"><td colspan="8"><div class="project-title"><span>${cat.icon}</span><span style="color:${cat.color};">${cat.label}</span><span class="project-stats">${completed}/${total} 完成 · ⏱${totalTime > 0 ? totalTime + 'h' : '—'}</span></div></td></tr>`;
                html += catTasks.map(t => buildTaskRow(t, true)).join('');
            });
            Object.keys(groups).forEach(key => {
                if (cats.find(c => c.key === key)) return;
                const catTasks = sortTasks(groups[key]);
                const catInfo = getCategoryInfo(key);
                html += `<tr class="project-group-header"><td colspan="8"><div class="project-title"><span>${catInfo.icon}</span><span>${catInfo.label}</span><span class="project-stats">${catTasks.length}个任务</span></div></td></tr>`;
                html += catTasks.map(t => buildTaskRow(t, true)).join('');
            });
            tbody.innerHTML = html;
        }

        function renderTasks() {
            let filteredTasks = [];
            if (currentTab === 'current') {
                filteredTasks = tasks.filter(t => {
                    return isInWeek(t.deadline, 0) || isAfterWeek(t.deadline, 0);
                });
                document.getElementById('sectionTitleText').textContent = '本周工作';
            } else if (currentTab === 'next') {
                filteredTasks = tasks.filter(t => isInWeek(t.deadline, 1));
                document.getElementById('sectionTitleText').textContent = '下周工作';
            } else if (currentTab === 'archive') {
                filteredTasks = tasks.filter(t => isInWeek(t.deadline, currentWeekOffset));
                const week = getWeekRange(currentWeekOffset);
                document.getElementById('sectionTitleText').textContent = `${formatDateCN(week.start)} - ${formatDateCN(week.end)}`;
            }

            // Apply filters
            const project = document.getElementById('filterProject').value;
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            filteredTasks = filteredTasks.filter(task => {
                const taskProject = task.projectName && task.projectName.trim() !== '' ? task.projectName : '';
                const projInfo = getProjectInfo(taskProject);
                const taskProjectKey = projInfo.key;
                return (!project || taskProject === project || taskProjectKey === project) &&
                       (!category || task.category === category) &&
                       (!status || task.status === status) &&
                       (!priority || task.priority === priority) &&
                       (!search || (task.projectName && task.projectName.toLowerCase().includes(search)) ||
                        task.taskName.toLowerCase().includes(search) ||
                        (task.notes && task.notes.toLowerCase().includes(search)));
            });

            if (currentView === 'group') renderGroupView(filteredTasks);
            else if (currentView === 'category') renderCategoryView(filteredTasks);
            else renderListView(filteredTasks);
        }

        // ===== Stats =====
        function updateStats() {
            let relevantTasks = [];
            if (currentTab === 'current') {
                relevantTasks = tasks.filter(t => isInWeek(t.deadline, 0) || isAfterWeek(t.deadline, 0));
            } else if (currentTab === 'next') {
                relevantTasks = tasks.filter(t => isInWeek(t.deadline, 1));
            } else {
                relevantTasks = tasks.filter(t => isInWeek(t.deadline, currentWeekOffset));
            }
            const today = new Date(); today.setHours(0, 0, 0, 0);
            document.getElementById('totalCount').textContent = relevantTasks.length;
            document.getElementById('urgentCount').textContent = relevantTasks.filter(t => isUrgent(t.deadline, t.status) && t.status !== 'completed').length;
            document.getElementById('todayCount').textContent = relevantTasks.filter(t => {
                if (t.status === 'completed') return false;
                const d = new Date(t.deadline); d.setHours(0, 0, 0, 0);
                return d.getTime() === today.getTime();
            }).length;
            document.getElementById('progressCount').textContent = relevantTasks.filter(t => t.status === 'progress').length;
            document.getElementById('completedCount').textContent = relevantTasks.filter(t => t.status === 'completed').length;
            document.getElementById('currentBadge').textContent = tasks.filter(t => isInWeek(t.deadline, 0)).length;
            document.getElementById('nextBadge').textContent = tasks.filter(t => isInWeek(t.deadline, 1)).length;
            document.getElementById('urgentBadge').textContent = tasks.filter(t => isUrgent(t.deadline, t.status) && t.status !== 'completed').length;
            updateSidebar();
        }

        // ===== Notifications =====
        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        showToast('通知已开启！到期前会弹出提醒 🎉', 'success');
                        document.getElementById('notificationPrompt').classList.remove('show');
                        scheduleNotifications();
                    }
                });
            }

        function scheduleNotifications() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            tasks.forEach(task => {
                if (task.status === 'completed') return;
                const deadline = new Date(task.deadline); deadline.setHours(9, 0, 0, 0);
                const reminderDate = new Date(deadline);
                reminderDate.setDate(reminderDate.getDate() - (task.reminder || 2));
                const now = new Date();
                if (reminderDate > now) {
                    setTimeout(() => {
                        if (Notification.permission === 'granted' && tasks.find(t => t.id === task.id && t.status !== 'completed')) {
                            new Notification('⏰ 任务到期提醒', {
                                body: `${task.taskName} 将在${(task.reminder || 2) === 0 ? '今天' : (task.reminder || 2) + '天后'}截止`,
                                icon: '🎮', tag: 'task-' + task.id
                            });
                        }
                    }, reminderDate.getTime() - now.getTime());
                }
            });
        }
        function checkReminders() {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const reminders = [];
            tasks.forEach(task => {
                if (task.status === 'completed') return;
                const deadline = new Date(task.deadline); deadline.setHours(0, 0, 0, 0);
                const diff = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
                const reminderDays = task.reminder || 2;
                if (diff <= reminderDays && diff >= 0) {
                    const name = task.projectName && task.projectName.trim() !== '' ? task.projectName : '个人任务';
                    reminders.push({ project: name, task: task.taskName, days: diff });
                }
            });
            if (reminders.length > 0) {
                const banner = document.getElementById('reminderBanner');
                const list = document.getElementById('reminderList');
                list.innerHTML = reminders.map(r =>
                    `<div style="margin-bottom:2px;">• ${r.project} - ${r.task} ${r.days === 0 ? '(今天截止！)' : `(剩余${r.days}天)`}</div>`
                ).join('');
                banner.classList.add('show');
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('⏰ 任务到期提醒', {
                        body: `您有 ${reminders.length} 个任务即将到期`,
                        icon: '🎮'
                    });
                }
            }
        }

            document.getElementById('reminderBanner').classList.remove('show');

            const now = new Date();
            let startDate = new Date(0);
            if (archivePeriod === 'month') {
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
            } else if (archivePeriod === 'quarter') {
                const q = Math.floor(now.getMonth() / 3);
                startDate = new Date(now.getFullYear(), q * 3, 1);
            } else if (archivePeriod === 'year') {
                startDate = new Date(now.getFullYear(), 0, 1);
            }
            let allTasks = [...tasks];
            Object.values(archives).forEach(archivedList => {
                allTasks = allTasks.concat(archivedList);
            });
            return allTasks.filter(t => {
                const d = new Date(t.deadline);
                return d >= startDate;
            });
        }

        function generateDonutPaths(data, total) {
            if (total === 0) return '<circle cx="18" cy="18" r="14" fill="none" stroke="#E0E0E0" stroke-width="3"/>';
            let paths = '';
            let offset = 0;
            data.forEach(d => {
                const pct = d.count / total * 100;
                const dashArray = `${pct} ${100 - pct}`;
                paths += `<circle cx="18" cy="18" r="14" fill="none" stroke="${d.color}" stroke-width="3" stroke-dasharray="${dashArray}" stroke-dashoffset="${-offset}" transform="rotate(-90 18 18)"/>`;
                offset += pct;
            });
            return paths;
        }

                        projectSelect.value = '';

                    document.getElementById('taskName').value = task.taskName;
                    document.getElementById('category').value = task.category;
                    document.getElementById('status').value = task.status;
                    document.getElementById('priority').value = task.priority;
                    document.getElementById('progress').value = task.progress;
                    document.getElementById('progressSlider').value = task.progress;
                    document.getElementById('deadline').value = task.deadline;

        function saveTask() {
            const taskId = document.getElementById('taskId').value;
            const newStatus = document.getElementById('status').value;
            const newProgress = parseInt(document.getElementById('progress').value) || 0;
            let finalStatus = newStatus;
            let finalProgress = newProgress;
            if (finalStatus === 'completed' && finalProgress < 100) {
                finalProgress = 100;
            } else if (finalProgress >= 100 && finalStatus !== 'completed') {
                finalStatus = 'completed';
            } else if (finalProgress > 0 && finalProgress < 100 && finalStatus === 'pending') {
                finalStatus = 'progress';
            }

            const rawProject = document.getElementById('projectName').value.trim();
            // Convert project key back to label for storage (backward compat)
            let resolvedProjectName = rawProject;
            if (rawProject) {
                const projInfo = getProjectInfo(rawProject);
                resolvedProjectName = projInfo.label || rawProject;
            }

            const taskData = {
                projectName: resolvedProjectName,
                taskName: document.getElementById('taskName').value.trim(),
                category: document.getElementById('category').value,
                status: finalStatus,
                priority: document.getElementById('priority').value,
                progress: finalProgress,
                deadline: document.getElementById('deadline').value,
                reminder: parseInt(document.getElementById('reminder').value) || 2,
                repeat: document.getElementById('repeat').value,
                notes: document.getElementById('notes').value.trim(),
                timeCost: parseFloat(document.getElementById('timeCost').value) || 0,
                timeUnit: document.getElementById('timeUnit').value || 'h'
            };

            if (!taskData.taskName || !taskData.deadline) {
                showToast('请填写任务名称和截止日期', 'warning');
                return;
            }

            let justCompleted = false;
            const taskNameForCelebration = taskData.taskName;

            if (taskId) {
                const index = tasks.findIndex(t => t.id === parseInt(taskId));
                if (index !== -1) {
                    const oldStatus = tasks[index].status;
                    if (oldStatus !== 'completed' && finalStatus === 'completed') justCompleted = true;
                    tasks[index] = { ...tasks[index], ...taskData };
                    showToast('任务已更新 ✅', 'success');
                }
            } else {
                const newId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
                tasks.push({ id: newId, ...taskData });
                if (finalStatus === 'completed') justCompleted = true;
                showToast('任务已创建 🎉', 'success');
            }

            closeModal();
            saveToStorage();
            renderTasks(); updateStats(); updateProjectFilter(); checkReminders(); scheduleNotifications();
            if (justCompleted) setTimeout(() => triggerCelebration(taskNameForCelebration), 300);
        }
        function editTask(taskId) { openModal(taskId); }
        function deleteTask(taskId) {
            if (confirm('确定要删除此任务吗？')) {
                tasks = tasks.filter(t => t.id !== taskId);
                saveToStorage(); renderTasks(); updateStats(); updateProjectFilter();
                showToast('任务已删除', 'info');
            }
        }

        // ===== Category Config (with color block buttons) =====
        function openCategoryConfig() {
            const overlay = document.getElementById('categoryConfigOverlay');
            const list = document.getElementById('categoryConfigList');
            const cats = getCategories();
            list.innerHTML = cats.map(c => `
                <div class="category-config-item" data-key="${c.key}">
                    <input type="text" class="emoji-input" value="${c.icon}" placeholder="🏷️" title="图标">
                    <input type="text" class="cat-label-input" value="${c.label}" placeholder="类型名称">
                    <div style="position:relative;display:inline-block;">
                        <div class="cat-color-btn" style="background:${c.color};" onclick="this.nextElementSibling.click()" title="点击选择颜色"></div>
                        <input type="color" class="cat-color-input" value="${c.color}" onchange="this.previousElementSibling.style.background=this.value;" title="颜色">
                    </div>
                    <button class="remove-cat-btn" onclick="this.parentElement.remove()">✕</button>
                </div>
            `).join('');
            overlay.classList.add('active');
        }
        function closeCategoryConfig() { document.getElementById('categoryConfigOverlay').classList.remove('active'); }
        function addCategoryRow() {
            const list = document.getElementById('categoryConfigList');
            const div = document.createElement('div');
            div.className = 'category-config-item';
            div.innerHTML = `
                <input type="text" class="emoji-input" value="📌" placeholder="🏷️" title="图标">
                <input type="text" class="cat-label-input" value="" placeholder="新类型名称">
                <div style="position:relative;display:inline-block;">
                    <div class="cat-color-btn" style="background:#BDBDBD;" onclick="this.nextElementSibling.click()" title="点击选择颜色"></div>
                    <input type="color" class="cat-color-input" value="#BDBDBD" onchange="this.previousElementSibling.style.background=this.value;" title="颜色">
                </div>
                <button class="remove-cat-btn" onclick="this.parentElement.remove()">✕</button>
            `;
            list.appendChild(div);
        }
        function saveCategoryConfig() {
            const items = document.querySelectorAll('.category-config-item');
            const newCats = [];
            items.forEach(item => {
                const icon = item.querySelector('.emoji-input').value.trim() || '📌';
                const label = item.querySelector('.cat-label-input').value.trim();
                const colorInput = item.querySelector('.cat-color-input');
                const color = colorInput ? colorInput.value : '#BCAAA4';
                if (label) {
                    const existingKey = item.dataset.key;
                    newCats.push({ key: existingKey || generateCategoryKey(label), label, icon, color });
                }
            });
            if (!newCats.find(c => c.key === 'other')) {
                newCats.push({ key: 'other', label: '其他', icon: '📌', color: '#BCAAA4' });
            }
            categories = newCats;
            localStorage.setItem('gameOps_categories', JSON.stringify(categories));
            updateCategorySelect(); updateCategoryFilter(); renderTasks();
            closeCategoryConfig();
            showToast('类型配置已保存 ✅', 'success');
        }

        // ===== Role Config =====
        function openRoleConfig() {
            const overlay = document.getElementById('roleConfigOverlay');
            const list = document.getElementById('roleConfigList');
            const rls = roles.length > 0 ? roles : defaultRoles;
            list.innerHTML = rls.map(r => `
                <div class="role-config-item">
                    <input type="text" value="${r}" placeholder="职位名称">
                    <button class="remove-role-btn" onclick="this.parentElement.remove()">✕</button>
                </div>
            `).join('');
            overlay.classList.add('active');
        }
        function closeRoleConfig() { document.getElementById('roleConfigOverlay').classList.remove('active'); }
        function addRoleRow() {
            const list = document.getElementById('roleConfigList');
            const div = document.createElement('div');
            div.className = 'role-config-item';
            div.innerHTML = `
                <input type="text" value="" placeholder="新职位名称">
                <button class="remove-role-btn" onclick="this.parentElement.remove()">✕</button>
            `;
            list.appendChild(div);
        }
        function saveRoleConfig() {
            const items = document.querySelectorAll('.role-config-item');
            const newRoles = [];
            items.forEach(item => {
                const val = item.querySelector('input').value.trim();
                if (val) newRoles.push(val);
            });
            if (newRoles.length === 0) newRoles.push('海外游戏产品运营');
            roles = newRoles;
            localStorage.setItem('gameOps_roles', JSON.stringify(roles));
            if (!roles.includes(currentRole)) currentRole = roles[0];
            updateRoleSelect(); saveToStorage();
            closeRoleConfig();
            showToast('职位配置已保存 ✅', 'success');
        }

        // ===== Project Config =====
        function openProjectConfig() {
            const overlay = document.getElementById('projectConfigOverlay');
            const list = document.getElementById('projectConfigList');
            const projs = getProjects();
            list.innerHTML = projs.map(p => `
                <div class="category-config-item" data-key="${p.key}">
                    <input type="text" class="emoji-input" value="${p.icon}" placeholder="📁" title="图标">
                    <input type="text" class="cat-label-input" value="${p.label}" placeholder="项目名称">
                    <div style="position:relative;display:inline-block;">
                        <div class="cat-color-btn" style="background:${p.color};" onclick="this.nextElementSibling.click()" title="点击选择颜色"></div>
                        <input type="color" class="cat-color-input" value="${p.color}" onchange="this.previousElementSibling.style.background=this.value;" title="颜色">
                    </div>
                    <button class="remove-cat-btn" onclick="this.parentElement.remove()">✕</button>
                </div>
            `).join('');
            overlay.classList.add('active');
        }
        function closeProjectConfig() { document.getElementById('projectConfigOverlay').classList.remove('active'); }
        function addProjectRow() {
            const list = document.getElementById('projectConfigList');
            const div = document.createElement('div');
            div.className = 'category-config-item';
            div.innerHTML = `
                <input type="text" class="emoji-input" value="📁" placeholder="📁" title="图标">
                <input type="text" class="cat-label-input" value="" placeholder="新项目名称">
                <div style="position:relative;display:inline-block;">
                    <div class="cat-color-btn" style="background:#78909C;" onclick="this.nextElementSibling.click()" title="点击选择颜色"></div>
                    <input type="color" class="cat-color-input" value="#78909C" onchange="this.previousElementSibling.style.background=this.value;" title="颜色">
                </div>
                <button class="remove-cat-btn" onclick="this.parentElement.remove()">✕</button>
            `;
            list.appendChild(div);
        }
        function saveProjectConfig() {
            const items = document.querySelectorAll('#projectConfigList .category-config-item');
            const newProjs = [];
            items.forEach(item => {
                const icon = item.querySelector('.emoji-input').value.trim() || '📁';
                const label = item.querySelector('.cat-label-input').value.trim();
                const colorInput = item.querySelector('.cat-color-input');
                const color = colorInput ? colorInput.value : '#78909C';
                if (label) {
                    const existingKey = item.dataset.key;
                    newProjs.push({ key: existingKey || generateProjectKey(label), label, icon, color });
                }
            });
            projects = newProjs;
            localStorage.setItem('gameOps_projects', JSON.stringify(projects));
            updateProjectSelect(); updateProjectFilter(); renderTasks();
            closeProjectConfig();
            showToast('项目配置已保存 ✅', 'success');
        }

        // ===== Toast =====
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-message">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0'; toast.style.transform = 'translateX(16px)';
                setTimeout(() => toast.remove(), 200);
            }, 2800);
        }

        // ===== Storage (backward compatible) =====
        function saveToStorage() {
            localStorage.setItem('gameOpsTasks', JSON.stringify(tasks));
            localStorage.setItem('gameOpsArchives', JSON.stringify(archives));
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('gameOpsTasks');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        tasks = parsed.map(t => ({
                            ...t,
                            timeCost: t.timeCost || 0,
                            timeUnit: t.timeUnit || 'h',
                            reminder: t.reminder || 2,
                            repeat: t.repeat || 'none',
                            notes: t.notes || ''
                        }));
                    }
                } catch (e) { console.warn('Failed to parse tasks:', e); }
            }
            const storedArchives = localStorage.getItem('gameOpsArchives');
            if (storedArchives) {
                try { archives = JSON.parse(storedArchives); } catch (e) {}
            }
            const storedCats = localStorage.getItem('gameOps_categories');
            if (storedCats) {
                try { categories = JSON.parse(storedCats); } catch (e) {}
            }
            const storedRoles = localStorage.getItem('gameOps_roles');
            if (storedRoles) {
                try { roles = JSON.parse(storedRoles); } catch (e) {}
            }
            const storedProjs = localStorage.getItem('gameOps_projects');
            if (storedProjs) {
                try { projects = JSON.parse(storedProjs); } catch (e) {}
            }
            const storedRole = localStorage.getItem('gameOps_currentRole');
            if (storedRole) currentRole = storedRole;
            const storedSound = localStorage.getItem('gameOps_soundEnabled');
            if (storedSound !== null) {
                soundEnabled = storedSound === 'true';
            }
            return tasks.length > 0;
        }

        function initDefaultData() {
            tasks = [
                { id: 1, projectName: '', taskName: '查看邮件并回复紧急事项', category: 'other', priority: 'high', progress: 0, deadline: getTodayStr(0), status: 'pending', reminder: 0, repeat: 'daily', notes: '每日例行工作', timeCost: 1, timeUnit: 'h' },
                { id: 2, projectName: '', taskName: '整理本周数据报告', category: 'data', priority: 'medium', progress: 0, deadline: getTodayStr(2), status: 'pending', reminder: 2, repeat: 'weekly', notes: '每周三提交', timeCost: 3, timeUnit: 'h' },
                { id: 3, projectName: 'Project Alpha', taskName: 'App Store资源更新', category: 'store', priority: 'high', progress: 60, deadline: getTodayStr(3), status: 'progress', reminder: 2, repeat: 'none', notes: '', timeCost: 0.5, timeUnit: 'd' },
                { id: 4, projectName: 'Project Alpha', taskName: 'AB测试数据分析', category: 'abtest', priority: 'medium', progress: 20, deadline: getTodayStr(8), status: 'progress', reminder: 2, repeat: 'none', notes: '', timeCost: 4, timeUnit: 'h' },
            ];
            saveToStorage();
        }

        // ===== Event Listeners =====
        document.getElementById('filterProject').addEventListener('change', filterTasks);
        document.getElementById('filterCategory').addEventListener('change', filterTasks);
        document.getElementById('filterStatus').addEventListener('change', filterTasks);
        document.getElementById('filterPriority').addEventListener('change', filterTasks);
        document.getElementById('searchInput').addEventListener('input', filterTasks);
        document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
        document.getElementById('categoryConfigOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeCategoryConfig(); });
        document.getElementById('roleConfigOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeRoleConfig(); });
        document.getElementById('projectConfigOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeProjectConfig(); });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeModal(); closeCategoryConfig(); closeRoleConfig(); closeProjectConfig(); }
            if (e.key === 'n' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); openModal(); }
        });

        // ===== Initialize =====
        if (!loadFromStorage()) initDefaultData();

        document.getElementById('soundToggle').textContent = soundEnabled ? '🔔' : '🔕';
        document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);

        updateWeekLabel();
        updateRoleSelect();
        updateCategorySelect();
        updateCategoryFilter();
        updateProjectSelect();
        renderTasks();
        updateStats();
        updateDateDisplay();
        updateProjectFilter();
        checkReminders();

        if ('Notification' in window && Notification.permission === 'default') {
            document.getElementById('notificationPrompt').classList.add('show');
        } else if (Notification.permission === 'granted') {
            scheduleNotifications();
        }

        setInterval(checkReminders, 60000);

        function scheduleProgressiveReminders() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            const now = new Date();
            tasks.forEach(task => {
                if (task.status === 'completed') return;
                const deadline = new Date(task.deadline); deadline.setHours(18, 0, 0, 0);
                const diff = deadline - now;
                if (diff > 0 && diff < 86400000) {
                    const t = Math.max(0, diff - 86400000);
                    setTimeout(() => {
                        if (tasks.find(t2 => t2.id === task.id && t2.status !== 'completed')) {
                            new Notification('⏰ 任务24小时内到期', {
                                body: `${task.taskName} — ${getRelativeTime(task.deadline)}`,
                                tag: 'task-1d-' + task.id
                            });
                        }
                    }, t);
                }
                if (diff > 0 && diff < 86400000) {
                    const t2 = Math.max(0, diff - 7200000);
                    setTimeout(() => {
                        if (tasks.find(t3 => t3.id === task.id && t3.status !== 'completed')) {
                            new Notification('🚨 任务2小时内到期！', {
                                body: `${task.taskName} 即将截止！`,
                                tag: 'task-2h-' + task.id
                            });
                        }
                    }, t2);
                }
            });
        }
        scheduleProgressiveReminders();
    </script>
</body>
