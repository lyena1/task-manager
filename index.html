
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日程管理 - 海外游戏运营</title>
    <style>
        :root {
            /* 护眼模式配色 */
            --primary: #5B8C5A;
            --primary-light: #7BA87A;
            --primary-dark: #4A7349;
            --success: #5B8C5A;
            --warning: #C9A227;
            --danger: #C44536;
            --info: #4A7C9B;
            --purple: #7B6BA4;
            --pink: #B57BA4;
            --cyan: #4A9B9B;
            --teal: #5BA8A0;
            --coral: #C4705A;
            --yellow: #C9B227;
            
            /* 护眼中性色 - 暖色调低对比度 */
            --gray-50: #FBFAF8;
            --gray-100: #F5F3EF;
            --gray-200: #E8E4DC;
            --gray-300: #D4CFC4;
            --gray-400: #A8A299;
            --gray-500: #78746B;
            --gray-600: #5A564E;
            --gray-700: #3D3A34;
            --gray-800: #2A2824;
            --gray-900: #1A1816;
            
            --bg-main: #F7F5F0;
            --bg-card: #FDFCF9;
            --bg-hover: #F0EDE5;
            
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--gray-800);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--teal));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(91, 140, 90, 0.25);
        }

        .header-title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gray-800);
            letter-spacing: -0.3px;
        }

        .header-title p {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-display {
            background: var(--bg-card);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            color: var(--gray-600);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        /* ===== Week Navigation ===== */
        .week-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
        }

        .week-nav-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            transition: all 0.15s ease;
            font-size: 1rem;
        }

        .week-nav-btn:hover {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .week-nav-label {
            padding: 0 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray-700);
            min-width: 120px;
            text-align: center;
        }

        /* ===== Reminder Banner ===== */
        .reminder-banner {
            background: linear-gradient(135deg, #FFF9E6, #FFF5D6);
            border-radius: var(--radius);
            padding: 14px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 14px;
            border: 1px solid #E8D9A0;
            border-left: 4px solid var(--warning);
            animation: slideDown 0.4s ease;
        }

        .reminder-banner.show {
            display: flex;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reminder-icon {
            font-size: 1.3rem;
        }

        .reminder-content {
            flex: 1;
        }

        .reminder-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #8A7A20;
            margin-bottom: 2px;
        }

        .reminder-list {
            font-size: 0.85rem;
            color: #7A6A10;
        }

        .reminder-close {
            background: rgba(201, 162, 39, 0.2);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            color: #8A7A20;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .reminder-close:hover {
            background: rgba(201, 162, 39, 0.35);
        }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--gray-500);
        }

        .tab.active {
            background: white;
            color: var(--gray-800);
            box-shadow: var(--shadow-sm);
        }

        .tab:hover:not(.active) {
            color: var(--gray-700);
        }

        .tab-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: var(--gray-200);
            border-radius: 10px;
            font-size: 0.7rem;
            margin-left: 6px;
        }

        .tab.active .tab-badge {
            background: var(--primary);
            color: white;
        }

        /* ===== Stats ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .stat-card.total::before { background: var(--cyan); }
        .stat-card.urgent::before { background: var(--coral); }
        .stat-card.today::before { background: var(--warning); }
        .stat-card.progress::before { background: var(--purple); }
        .stat-card.completed::before { background: var(--primary); }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--gray-500);
            font-weight: 500;
        }

        .stat-icon {
            font-size: 1.1rem;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-card.total .stat-number { color: var(--cyan); }
        .stat-card.urgent .stat-number { color: var(--coral); }
        .stat-card.today .stat-number { color: #A88A20; }
        .stat-card.progress .stat-number { color: var(--purple); }
        .stat-card.completed .stat-number { color: var(--primary); }

        /* ===== Main Layout ===== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
        }

        /* ===== Task Section ===== */
        .task-section {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .section-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray-50);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-actions {
            display: flex;
            gap: 8px;
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            background: var(--gray-100);
            border-radius: 6px;
            padding: 2px;
        }

        .view-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--gray-500);
        }

        .view-btn.active {
            background: white;
            color: var(--gray-700);
            box-shadow: var(--shadow-sm);
        }

        /* Filters */
        .filters-row {
            padding: 12px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        select, input[type="text"], input[type="date"] {
            padding: 8px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s ease;
            background: var(--bg-card);
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(91, 140, 90, 0.15);
        }

        .search-input {
            flex: 1;
            min-width: 180px;
            max-width: 280px;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(91, 140, 90, 0.25);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
        }

        /* ===== Table ===== */
        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        thead {
            background: var(--gray-50);
        }

        th {
            padding: 10px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1px solid var(--gray-200);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }

        tbody tr {
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: var(--bg-hover);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tr.urgent-row {
            background: linear-gradient(90deg, rgba(196, 112, 90, 0.08), transparent);
        }

        tr.urgent-row:hover {
            background: linear-gradient(90deg, rgba(196, 112, 90, 0.12), transparent);
        }

        tr.completed-row {
            opacity: 0.65;
        }

        /* Project Group Header */
        .project-group-header {
            background: linear-gradient(90deg, #EDF3ED, #F2F6F0);
        }

        .project-group-header td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .project-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .project-stats {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary);
            margin-left: auto;
        }

        /* Task Cell */
        .task-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .task-name {
            font-weight: 500;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-project-tag {
            font-size: 0.7rem;
            color: var(--gray-400);
            margin-top: 2px;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-store { background: #E8F0F4; color: #3A6A8A; }
        .badge-abtest { background: #EDE8F4; color: #6A5A94; }
        .badge-data { background: #E8F4EC; color: #4A7A5A; }
        .badge-version { background: #F4F0E8; color: #8A7A4A; }
        .badge-monetization { background: #F4E8EE; color: #8A5A6A; }
        .badge-other { background: #F0EEEC; color: #6A6460; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .status-pending { background: #F0EEEC; color: #6A6460; }
        .status-pending::before { background: #8A847E; }
        .status-progress { background: #E8F0F4; color: #3A6A8A; }
        .status-progress::before { background: var(--cyan); animation: pulse 1.5s infinite; }
        .status-review { background: #EDE8F4; color: #6A5A94; }
        .status-review::before { background: var(--purple); }
        .status-completed { background: #E8F4EC; color: #4A7A5A; }
        .status-completed::before { background: var(--primary); }
        .status-delayed { background: #F4E8E8; color: #8A4A4A; }
        .status-delayed::before { background: var(--coral); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .priority-high { 
            color: var(--coral); 
            font-weight: 600;
        }
        .priority-medium { 
            color: #A88A20; 
            font-weight: 500;
        }
        .priority-low { 
            color: var(--gray-500); 
        }

        /* Date */
        .date-cell {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .date-main {
            font-size: 0.85rem;
            color: var(--gray-700);
            font-weight: 500;
        }

        .date-relative {
            font-size: 0.7rem;
            color: var(--gray-400);
        }

        .date-overdue .date-main,
        .date-overdue .date-relative {
            color: var(--coral);
            font-weight: 600;
        }

        .date-urgent .date-main {
            color: #A88A20;
        }

        /* Progress */
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            width: 50px;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--teal));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--gray-500);
            min-width: 32px;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            color: var(--gray-400);
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray-50);
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-badge {
            background: #F4E8E8;
            color: #8A4A4A;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .sidebar-content {
            padding: 12px;
            max-height: 240px;
            overflow-y: auto;
        }

        .deadline-item {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: var(--gray-50);
            transition: all 0.15s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .deadline-item:last-child {
            margin-bottom: 0;
        }

        .deadline-item:hover {
            background: var(--bg-hover);
            border-color: var(--gray-200);
        }

        .deadline-item.urgent {
            background: #F9F4F2;
            border-left: 3px solid var(--coral);
        }

        .deadline-item.warning {
            background: #F9F7F0;
            border-left: 3px solid var(--warning);
        }

        .deadline-icon {
            font-size: 1rem;
        }

        .deadline-info {
            flex: 1;
            min-width: 0;
        }

        .deadline-task {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--gray-800);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deadline-project {
            font-size: 0.7rem;
            color: var(--gray-400);
            margin-top: 2px;
        }

        .deadline-time {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--gray-500);
            white-space: nowrap;
        }

        .deadline-item.urgent .deadline-time {
            color: var(--coral);
        }

        .deadline-item.warning .deadline-time {
            color: #A88A20;
        }

        .empty-sidebar {
            text-align: center;
            padding: 20px 12px;
            color: var(--gray-400);
            font-size: 0.8rem;
        }

        /* Quick Add */
        .quick-add {
            padding: 12px;
        }

        .quick-btn {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--gray-300);
            border-radius: 8px;
            background: transparent;
            color: var(--gray-500);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .quick-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(91, 140, 90, 0.05);
        }

        /* ===== Archive Panel ===== */
        .archive-panel {
            display: none;
        }

        .archive-panel.active {
            display: block;
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
        }

        .archive-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
        }

        .archive-week-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .archive-stats {
            display: flex;
            gap: 16px;
        }

        .archive-stat {
            text-align: center;
        }

        .archive-stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .archive-stat-label {
            font-size: 0.7rem;
            color: var(--gray-500);
        }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 24, 22, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(-8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-800);
        }

        .modal-close {
            width: 30px;
            height: 30px;
            border: none;
            background: var(--gray-100);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            transition: all 0.15s ease;
        }

        .modal-close:hover {
            background: var(--gray-200);
        }

        .modal-body {
            padding: 20px 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--gray-700);
            font-size: 0.85rem;
        }

        .form-group label .optional {
            font-weight: 400;
            color: var(--gray-400);
            font-size: 0.75rem;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            background: var(--bg-card);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(91, 140, 90, 0.15);
        }

        .form-group input::placeholder {
            color: var(--gray-400);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .modal-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            background: var(--gray-50);
        }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: 8px;
            background: var(--bg-card);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: toastIn 0.25s ease;
            max-width: 320px;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(16px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.success { border-left: 3px solid var(--primary); }
        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.error { border-left: 3px solid var(--coral); }
        .toast.info { border-left: 3px solid var(--cyan); }

        .toast-message {
            font-size: 0.85rem;
            color: var(--gray-700);
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.9rem;
        }

        /* ===== Notification Permission ===== */
        .notification-prompt {
            background: linear-gradient(135deg, #EDF3ED, #E8F0E8);
            border: 1px solid var(--primary-light);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .notification-prompt.show {
            display: flex;
        }

        .notification-prompt-text {
            flex: 1;
            font-size: 0.85rem;
            color: var(--gray-700);
        }

        .notification-prompt-btn {
            padding: 6px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* ===== Celebration Effects ===== */
        .celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 3000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-100px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .celebration-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, #FFF9E6, #FFFDF5);
            border-radius: 20px;
            padding: 32px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            z-index: 3001;
            opacity: 0;
            animation: celebrationPop 0.5s ease forwards;
            border: 2px solid #E8D9A0;
        }

        @keyframes celebrationPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .celebration-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            animation: bounce 0.6s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .celebration-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .celebration-quote {
            font-size: 0.95rem;
            color: var(--gray-600);
            margin-bottom: 20px;
            font-style: italic;
            line-height: 1.5;
        }

        .celebration-task {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }

        .celebration-task-name {
            font-weight: 600;
            color: var(--gray-800);
            font-size: 0.95rem;
        }

        .celebration-close {
            background: linear-gradient(135deg, var(--primary), var(--teal));
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(91, 140, 90, 0.3);
        }

        .celebration-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(91, 140, 90, 0.4);
        }

        .celebration-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(91, 140, 90, 0.08);
            border-radius: 12px;
        }

        .celebration-stat {
            text-align: center;
        }

        .celebration-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .celebration-stat-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 2px;
        }

        /* Sound toggle button */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--gray-200);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            z-index: 100;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .sound-toggle.muted {
            opacity: 0.6;
        }

        /* ===== Responsive ===== */
        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .stats-bar {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .stats-bar {
                grid-template-columns: repeat(3, 1fr);
            }
            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input {
                max-width: none;
            }
            .sidebar {
                grid-template-columns: 1fr;
            }
            .form-row, .form-row-3 {
                grid-template-columns: 1fr;
            }
            .tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">🎮</div>
                <div class="header-title">
                    <h1>工作日程管理</h1>
                    <p>海外游戏产品运营</p>
                </div>
            </div>
            <div class="header-right">
                <div class="week-nav">
                    <button class="week-nav-btn" onclick="changeWeek(-1)" title="上一周">◀</button>
                    <span class="week-nav-label" id="weekLabel">本周</span>
                    <button class="week-nav-btn" onclick="changeWeek(1)" title="下一周">▶</button>
                </div>
                <div class="date-display" id="dateDisplay"></div>
                <button class="btn btn-primary" onclick="openModal()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    新建
                </button>
            </div>
        </header>

        <!-- Notification Prompt -->
        <div class="notification-prompt" id="notificationPrompt">
            <span>🔔</span>
            <div class="notification-prompt-text">

            </div>
            <button class="notification-prompt-btn" onclick="requestNotificationPermission()">开启通知</button>
        </div>

        <!-- Reminder Banner -->
        <div class="reminder-banner" id="reminderBanner">
            <div class="reminder-icon">⚠️</div>
            <div class="reminder-content">
                <div class="reminder-title">任务到期提醒</div>
                <div class="reminder-list" id="reminderList"></div>
            </div>
            <button class="reminder-close" onclick="closeReminder()">✕</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="current" onclick="switchTab('current')">
                本周工作<span class="tab-badge" id="currentBadge">0</span>
            </button>
            <button class="tab" data-tab="next" onclick="switchTab('next')">
                下周工作<span class="tab-badge" id="nextBadge">0</span>
            </button>
            <button class="tab" data-tab="archive" onclick="switchTab('archive')">
                往期归档
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card total">
                <div class="stat-header">
                    <span class="stat-label">总任务</span>
                    <span class="stat-icon">📋</span>
                </div>
                <div class="stat-number" id="totalCount">0</div>
            </div>
            <div class="stat-card urgent">
                <div class="stat-header">
                    <span class="stat-label">紧急</span>
                    <span class="stat-icon">🔥</span>
                </div>
                <div class="stat-number" id="urgentCount">0</div>
            </div>
            <div class="stat-card today">
                <div class="stat-header">
                    <span class="stat-label">今日</span>
                    <span class="stat-icon">📅</span>
                </div>
                <div class="stat-number" id="todayCount">0</div>
            </div>
            <div class="stat-card progress">
                <div class="stat-header">
                    <span class="stat-label">进行中</span>
                    <span class="stat-icon">🔄</span>
                </div>
                <div class="stat-number" id="progressCount">0</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-header">
                    <span class="stat-label">已完成</span>
                    <span class="stat-icon">✅</span>
                </div>
                <div class="stat-number" id="completedCount">0</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Task Section -->
            <div class="task-section">
                <div class="section-header">
                    <div class="section-title">
                        <span>📊</span>
                        <span id="sectionTitleText">任务列表</span>
                    </div>
                    <div class="section-actions">
                        <div class="view-toggle">
                            <button class="view-btn active" id="viewList" onclick="setView('list')">列表</button>
                            <button class="view-btn" id="viewGroup" onclick="setView('group')">分组</button>
                        </div>
                    </div>
                </div>
                <div class="filters-row" id="filtersRow">
                    <select id="filterProject">
                        <option value="">全部项目</option>
                    </select>
                    <select id="filterCategory">
                        <option value="">全部类型</option>
                        <option value="store">商店运营</option>
                        <option value="abtest">AB测试</option>
                        <option value="data">数据分析</option>
                        <option value="version">版本运营</option>
                        <option value="monetization">商业化运营</option>
                        <option value="other">其他</option>
                    </select>
                    <select id="filterStatus">
                        <option value="">全部状态</option>
                        <option value="pending">待处理</option>
                        <option value="progress">进行中</option>
                        <option value="review">待审核</option>
                        <option value="completed">已完成</option>
                        <option value="delayed">已延期</option>
                    </select>
                    <select id="filterPriority">
                        <option value="">全部优先级</option>
                        <option value="high">高</option>
                        <option value="medium">中</option>
                        <option value="low">低</option>
                    </select>
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索任务...">
                </div>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>任务</th>
                                <th>类型</th>
                                <th>优先级</th>
                                <th>进度</th>
                                <th>截止时间</th>
                                <th>状态</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Urgent Tasks -->
                <div class="sidebar-card">
                    <div class="sidebar-header">
                        <span class="sidebar-title">🔥 紧急待办</span>
                        <span class="sidebar-badge" id="urgentBadge">0</span>
                    </div>
                    <div class="sidebar-content" id="urgentList">
                        <div class="empty-sidebar">暂无紧急任务</div>
                    </div>
                </div>

                <!-- This Week -->
                <div class="sidebar-card">
                    <div class="sidebar-header">
                        <span class="sidebar-title">📆 本周截止</span>
                    </div>
                    <div class="sidebar-content" id="weekList">
                        <div class="empty-sidebar">本周暂无截止任务</div>
                    </div>
                </div>

                <!-- Quick Add -->
                <div class="sidebar-card">
                    <div class="quick-add">
                        <button class="quick-btn" onclick="openModal()">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            添加新任务
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新建任务</h2>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>任务名称 <span style="color:var(--coral);">*</span></label>
                            <input type="text" id="taskName" required placeholder="输入任务名称">
                        </div>
                        <div class="form-group">
                            <label>项目名称<span class="optional">(选填)</span></label>
                            <input type="text" id="projectName" placeholder="留空为个人任务">
                        </div>
                    </div>
                    <div class="form-row-3">
                        <div class="form-group">
                            <label>工作类型</label>
                            <select id="category">
                                <option value="store">商店运营</option>
                                <option value="abtest">AB测试</option>
                                <option value="data">数据分析</option>
                                <option value="version">版本运营</option>
                                <option value="monetization">商业化运营</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>优先级</label>
                            <select id="priority">
                                <option value="high">高</option>
                                <option value="medium" selected>中</option>
                                <option value="low">低</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select id="status">
                                <option value="pending">待处理</option>
                                <option value="progress">进行中</option>
                                <option value="review">待审核</option>
                                <option value="completed">已完成</option>
                                <option value="delayed">已延期</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>截止日期 <span style="color:var(--coral);">*</span></label>
                            <input type="date" id="deadline" required>
                        </div>
                        <div class="form-group">
                            <label>进度</label>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <input type="range" id="progressSlider" min="0" max="100" value="0" style="flex:1;padding:0;">
                                <input type="number" id="progress" min="0" max="100" value="0" style="width:70px;text-align:center;">
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>提醒时间</label>
                            <select id="reminder">
                                <option value="0">截止当天</option>
                                <option value="1">提前1天</option>
                                <option value="2" selected>提前2天</option>
                                <option value="3">提前3天</option>
                                <option value="7">提前1周</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>重复周期</label>
                            <select id="repeat">
                                <option value="none">不重复</option>
                                <option value="daily">每日</option>
                                <option value="weekly">每周</option>
                                <option value="biweekly">双周</option>
                                <option value="monthly">每月</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="notes" rows="2" placeholder="任务详情、相关链接等..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Celebration Overlay -->
    <div class="celebration-overlay" id="celebrationOverlay"></div>

    <!-- Sound Toggle -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="开关音效">
        🔔
    </button>

    <script>
        // Configuration
        const categoryLabels = {
            store: { label: '商店运营', icon: '🏪' },
            abtest: { label: 'AB测试', icon: '🧪' },
            data: { label: '数据分析', icon: '📊' },
            version: { label: '版本运营', icon: '🚀' },
            monetization: { label: '商业化运营', icon: '💰' },
            other: { label: '其他', icon: '📌' }
        };

        const statusLabels = {
            pending: '待处理',
            progress: '进行中',
            review: '待审核',
            completed: '已完成',
            delayed: '已延期'
        };

        const priorityLabels = {
            high: '高',
            medium: '中',
            low: '低'
        };

        // Encouraging quotes for task completion
        const celebrationQuotes = [
            "太棒了！又完成了一项任务！🎉",
            "你就是效率达人！继续加油！💪",
            "每一步都是进步，你做得很好！🌟",
            "完成了！成就感满满！✨",
            "优秀！今天又是高效的一天！🚀",
            "任务搞定！给自己点个赞！👍",
            "干得漂亮！保持这个节奏！🔥",
            "太厉害了！你的努力会有回报的！💫",
            "又向前迈进了一步！你是最棒的！🌈",
            "完成任务的成就感是无价的！💎"
        ];

        // State
        let currentView = 'list';
        let currentTab = 'current';
        let currentWeekOffset = 0;
        let tasks = [];
        let archives = {};
        let soundEnabled = true;

        // ===== Audio Context for Sound Effects =====
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playCompletionSound() {
            if (!soundEnabled) return;
            initAudio();

            // Create a pleasant completion sound
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.4);
        }

        // ===== Date Helpers =====
        function getWeekRange(offset = 0) {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1) + (offset * 7));
            monday.setHours(0, 0, 0, 0);
            
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);
            
            return { start: monday, end: sunday };
        }

        function isInWeek(dateStr, offset = 0) {
            const week = getWeekRange(offset);
            const date = new Date(dateStr);
            return date >= week.start && date <= week.end;
        }

        function isBeforeWeek(dateStr, offset = 0) {
            const week = getWeekRange(offset);
            const date = new Date(dateStr);
            date.setHours(23, 59, 59, 999);
            return date < week.start;
        }

        function getTodayStr(offset) {
            const date = new Date();
            date.setDate(date.getDate() + offset);
            return date.toISOString().split('T')[0];
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}/${day}`;
        }

        function formatDateCN(date) {
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function getRelativeTime(dateStr) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr);
            target.setHours(0, 0, 0, 0);
            const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));

            if (diff < 0) return `逾期${Math.abs(diff)}天`;
            if (diff === 0) return '今天';
            if (diff === 1) return '明天';
            if (diff <= 7) return `${diff}天后`;
            return `${Math.ceil(diff / 7)}周后`;
        }

        function isUrgent(dateStr, status) {
            if (status === 'completed') return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr);
            target.setHours(0, 0, 0, 0);
            const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            return diff <= 2;
        }

        function getSortScore(task) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const deadline = new Date(task.deadline);
            deadline.setHours(0, 0, 0, 0);
            const daysLeft = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

            const priorityWeight = { high: 3, medium: 2, low: 1 }[task.priority] || 2;
            
            let urgencyFactor = 0;
            if (task.status !== 'completed') {
                if (daysLeft < 0) urgencyFactor = 100;
                else if (daysLeft === 0) urgencyFactor = 50;
                else if (daysLeft === 1) urgencyFactor = 30;
                else if (daysLeft === 2) urgencyFactor = 20;
                else if (daysLeft <= 7) urgencyFactor = 10;
            }

            const completedPenalty = task.status === 'completed' ? 1000 : 0;
            const adjustedDays = daysLeft < 0 ? (100 + Math.abs(daysLeft)) : daysLeft;
            
            return {
                score: (100 - adjustedDays) + (priorityWeight * 10) + urgencyFactor - completedPenalty,
                daysLeft: daysLeft
            };
        }

        function sortTasks(taskList) {
            return [...taskList].sort((a, b) => {
                const scoreA = getSortScore(a);
                const scoreB = getSortScore(b);
                if (scoreA.score !== scoreB.score) return scoreB.score - scoreA.score;
                return new Date(a.deadline) - new Date(b.deadline);
            });
        }

        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        showToast('通知已开启', 'success');
                        document.getElementById('notificationPrompt').classList.remove('show');
                        scheduleNotifications();
                    }
                });

        function scheduleNotifications() {
            if (Notification.permission !== 'granted') return;

            tasks.forEach(task => {
                if (task.status === 'completed') return;
                
                const deadline = new Date(task.deadline);
                deadline.setHours(9, 0, 0, 0); // 9 AM on deadline day
                
                const reminderDate = new Date(deadline);
                reminderDate.setDate(reminderDate.getDate() - task.reminder);
                
                const now = new Date();
                if (reminderDate > now) {
                    const timeout = reminderDate.getTime() - now.getTime();
                    setTimeout(() => {
                        if (Notification.permission === 'granted') {
                            new Notification('任务到期提醒', {
                                body: `${task.taskName} 将在${task.reminder === 0 ? '今天' : task.reminder + '天后'}截止`,
                                icon: '🎮'
                            });
                        }
                    }, timeout);
                }
            });
        }

        function checkReminders() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const reminders = [];

            tasks.forEach(task => {
                if (task.status === 'completed') return;
                const deadline = new Date(task.deadline);
                deadline.setHours(0, 0, 0, 0);
                const diff = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

                if (diff <= task.reminder && diff >= 0) {
                    const name = task.projectName && task.projectName.trim() !== '' ? task.projectName : '个人任务';
                    reminders.push({ project: name, task: task.taskName, days: diff });
                }
            });

            if (reminders.length > 0) {
                const banner = document.getElementById('reminderBanner');
                const list = document.getElementById('reminderList');
                list.innerHTML = reminders.map(r => 
                    `<div style="margin-bottom:2px;">• ${r.project} - ${r.task} ${r.days === 0 ? '(今天)' : `(剩余${r.days}天)`}</div>`
                ).join('');
                banner.classList.add('show');
                
                // Browser notification
                if (Notification.permission === 'granted' && reminders.length > 0) {
                    new Notification('任务到期提醒', {
                        body: `您有 ${reminders.length} 个任务即将到期`,
                        icon: '🎮'
                    });
                }
            }
        }

        // ===== Archive Management =====
        function archiveCompletedTasks() {
            const lastWeek = getWeekRange(-1);
            const toArchive = tasks.filter(t => {
                if (t.status !== 'completed') return false;
                const d = new Date(t.deadline);
                return d >= lastWeek.start && d <= lastWeek.end;
            });

            if (toArchive.length > 0) {
                const weekKey = `${lastWeek.start.toISOString().split('T')[0]}`;
                if (!archives[weekKey]) archives[weekKey] = [];
                archives[weekKey].push(...toArchive);
                tasks = tasks.filter(t => !toArchive.includes(t));
                saveToStorage();
                showToast(`已归档 ${toArchive.length} 个已完成任务`, 'success');
            }
        }

        // ===== Filter =====
        function filterTasks() {
            renderTasks();
        }

        // ===== View Mode =====
        function setView(view) {
            currentView = view;
            document.getElementById('viewList').classList.toggle('active', view === 'list');
            document.getElementById('viewGroup').classList.toggle('active', view === 'group');
            renderTasks();
        }

        // ===== Modal =====
        function openModal(taskId = null) {
            const modal = document.getElementById('modalOverlay');
            const form = document.getElementById('taskForm');

            form.reset();
            document.getElementById('taskId').value = '';
            document.getElementById('progress').value = 0;
            document.getElementById('progressSlider').value = 0;

            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    document.getElementById('modalTitle').textContent = '编辑任务';
                    document.getElementById('taskId').value = task.id;
                    document.getElementById('projectName').value = task.projectName || '';
                    document.getElementById('taskName').value = task.taskName;
                    document.getElementById('category').value = task.category;
                    document.getElementById('status').value = task.status;
                    document.getElementById('priority').value = task.priority;
                    document.getElementById('progress').value = task.progress;
                    document.getElementById('progressSlider').value = task.progress;
                    document.getElementById('deadline').value = task.deadline;
                    document.getElementById('reminder').value = task.reminder || 2;
                    document.getElementById('repeat').value = task.repeat || 'none';
                    document.getElementById('notes').value = task.notes || '';
                }
            } else {
                document.getElementById('modalTitle').textContent = '新建任务';
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                document.getElementById('deadline').value = tomorrow.toISOString().split('T')[0];
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // Progress slider sync
        document.getElementById('progressSlider').addEventListener('input', function() {
            document.getElementById('progress').value = this.value;
        });
        document.getElementById('progress').addEventListener('input', function() {
            document.getElementById('progressSlider').value = this.value;
        });

        function saveTask() {
            const taskId = document.getElementById('taskId').value;
            const newStatus = document.getElementById('status').value;
            const taskData = {
                projectName: document.getElementById('projectName').value.trim(),
                taskName: document.getElementById('taskName').value.trim(),
                category: document.getElementById('category').value,
                status: newStatus,
                priority: document.getElementById('priority').value,
                progress: parseInt(document.getElementById('progress').value) || 0,
                deadline: document.getElementById('deadline').value,
                reminder: parseInt(document.getElementById('reminder').value),
                repeat: document.getElementById('repeat').value,
                notes: document.getElementById('notes').value.trim()
            };

            if (!taskData.taskName || !taskData.deadline) {
                showToast('请填写任务名称和截止日期', 'warning');
                return;
            }

            let justCompleted = false;
            const taskNameForCelebration = taskData.taskName;

            if (taskId) {
                const index = tasks.findIndex(t => t.id === parseInt(taskId));
                if (index !== -1) {
                    // Check if task is being marked as completed now
                    const oldStatus = tasks[index].status;
                    if (oldStatus !== 'completed' && newStatus === 'completed') {
                        justCompleted = true;
                    }
                    tasks[index] = { ...tasks[index], ...taskData };
                    showToast('任务已更新', 'success');
                }
            } else {
                const newId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
                tasks.push({ id: newId, ...taskData });
                // New task created as completed
                if (newStatus === 'completed') {
                    justCompleted = true;
                }
                showToast('任务已创建', 'success');
            }

            closeModal();
            saveToStorage();
            renderTasks();
            updateStats();
            updateProjectFilter();
            checkReminders();
            scheduleNotifications();

            // Trigger celebration if task just completed
            if (justCompleted) {
                setTimeout(() => triggerCelebration(taskNameForCelebration), 300);
            }
        }

        function editTask(taskId) {
            openModal(taskId);
        }

        function deleteTask(taskId) {
            if (confirm('确定要删除此任务吗？')) {
                tasks = tasks.filter(t => t.id !== taskId);
                saveToStorage();
                renderTasks();
                updateStats();
                updateProjectFilter();
                showToast('任务已删除', 'info');
            }
        }

        // ===== Toast =====
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-message">${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(16px)';
                setTimeout(() => toast.remove(), 200);
            }, 2500);
        }

        // ===== Storage =====
        function saveToStorage() {
            localStorage.setItem('gameOpsTasks', JSON.stringify(tasks));
            localStorage.setItem('gameOpsArchives', JSON.stringify(archives));
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('gameOpsTasks');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        tasks = parsed;
                        return true;
                    }
                } catch (e) {}
            }
            
            const storedArchives = localStorage.getItem('gameOpsArchives');
            if (storedArchives) {
                try {
                    archives = JSON.parse(storedArchives);
                } catch (e) {}
            }
            
            return false;
        }

        function initDefaultData() {
            tasks = [
                { id: 1, projectName: '', taskName: '查看邮件并回复紧急事项', category: 'other', priority: 'high', progress: 0, deadline: getTodayStr(0), status: 'pending', reminder: 0, repeat: 'daily', notes: '每日例行工作' },
                { id: 2, projectName: '', taskName: '整理本周数据报告', category: 'data', priority: 'medium', progress: 0, deadline: getTodayStr(2), status: 'pending', reminder: 2, repeat: 'weekly', notes: '每周三提交' },
                { id: 3, projectName: 'Project Alpha', taskName: 'App Store资源更新', category: 'store', priority: 'high', progress: 60, deadline: getTodayStr(3), status: 'progress', reminder: 2, repeat: 'none', notes: '' },
                { id: 4, projectName: 'Project Alpha', taskName: 'AB测试数据分析', category: 'abtest', priority: 'medium', progress: 20, deadline: getTodayStr(8), status: 'pending', reminder: 2, repeat: 'none', notes: '' },
            ];
            saveToStorage();
        }

        // ===== Event Listeners =====
        document.getElementById('filterProject').addEventListener('change', filterTasks);
        document.getElementById('filterCategory').addEventListener('change', filterTasks);
        document.getElementById('filterStatus').addEventListener('change', filterTasks);
        document.getElementById('filterPriority').addEventListener('change', filterTasks);
        document.getElementById('searchInput').addEventListener('input', filterTasks);
        document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'n' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); openModal(); }
        });

        // ===== Initialize =====
        if (!loadFromStorage()) initDefaultData();
        
        // Load sound preference
        const storedSound = localStorage.getItem('soundEnabled');
        if (storedSound !== null) {
            soundEnabled = storedSound === 'true';
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔔' : '🔕';
            document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
        }
        
        updateWeekLabel();
        renderTasks();
        updateStats();
        updateDateDisplay();
        updateProjectFilter();
        checkReminders();
        
        // Check notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            document.getElementById('notificationPrompt').classList.add('show');
        } else if (Notification.permission === 'granted') {
            scheduleNotifications();
        }
        
        // Periodic reminder check
        setInterval(checkReminders, 60000);
    </script>
</body>
</html>
